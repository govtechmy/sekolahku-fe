name: Deploy to AWS S3 Development

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # Updated to latest version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-5

      # FETCH JSON FILES FROM S3
      - name: Fetch school-list.json from S3
        run: |
          echo "Downloading school-list.json"
          aws s3 cp s3://${{ secrets.S3_PUBLIC_DEV }}/common/school-list.json school-list.json \
            || (echo "Failed to download school-list.json, using existing local file" && ls -l school-list.json || true)

      - name: Fetch snap-routes.json from S3
        run: |
          echo "Downloading snap-routes.json"
          aws s3 cp s3://${{ secrets.S3_PUBLIC_DEV }}/common/snap-routes.json snap-routes.json \
            || (echo "Failed to download snap-routes.json, using existing local file" && ls -l snap-routes.json || true)

      - name: Build project
        run: pnpm run build --mode development

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_DEV }} --delete

