name: Deploy to AWS S3 Development

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # Updated to latest version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # FETCH JSON FILES FROM S3
      - name: Fetch school-list.json
        run: |
          echo "Downloading school-list.json"
          curl -fSL "https://my.gov.digital.sekolahku-public-dev/common/school-list.json" \
            -o school-list.json

      - name: Fetch snap-routes.json
        run: |
          echo "Downloading snap-routes.json"
          curl -fSL "https://my.gov.digital.sekolahku-public-dev/common/snap-routes.json" \
            -o snap-routes.json

      - name: Build project
        run: pnpm run build --mode development

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-5

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_DEV }} --delete

