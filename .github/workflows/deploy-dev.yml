name: Deploy to AWS S3 Development

on:
  push:
    branches: [develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # Updated to latest version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      # Setup Node.js (UPDATED TO NODE 24)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"       # <— UPDATED
          cache: "pnpm"

      # Recreate pnpm-lock.yaml (Fresh lockfile)
      - name: Recreate pnpm-lock.yaml
        run: |
          rm -f pnpm-lock.yaml
          pnpm install --lockfile-only

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build --mode development

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-5

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_DEV }} --delete

